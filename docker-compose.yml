version: '3.8'

services:
  ml-service:
    build: .
    image: credit-default-service:latest
    container_name: credit-default-service
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      # используем python вместо curl — его нет в slim-образе
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
